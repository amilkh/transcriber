<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>竹本研究室 — Seminar Assistant</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      text-align: center;
      max-width: 420px;
      padding: 2.5rem 2rem;
    }
    h1 { font-size: 1.4rem; margin: 0 0 0.4rem; }
    .sub { color: #94a3b8; font-size: 0.95rem; margin: 0 0 2rem; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #334155;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status { font-size: 0.9rem; color: #94a3b8; margin-bottom: 1.5rem; }
    .error { color: #f87171; font-size: 0.9rem; display: none; }
    a.manual {
      display: inline-block;
      margin-top: 1rem;
      color: #6366f1;
      font-size: 0.85rem;
      text-decoration: none;
    }
    a.manual:hover { text-decoration: underline; }
    .note {
      margin-top: 2rem;
      font-size: 0.78rem;
      color: #475569;
      border-top: 1px solid #1e293b;
      padding-top: 1.2rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>竹本研究室</h1>
    <p class="sub">Seminar Assistant — Viewer</p>
    <div class="spinner" id="spinner"></div>
    <p class="status" id="status">Connecting to classroom…</p>
    <p class="error" id="error">
      Could not reach the classroom server.<br>
      Make sure you are connected to the <strong>university WiFi</strong>.
    </p>
    <a class="manual" id="manual-link" href="http://10.10.5.59:8080/?view" style="display:none">
      Open manually →
    </a>
    <p class="note">
      This link only works on the university network (Fukui WiFi).<br>
      No mic — read-only live transcript.
    </p>
  </div>

  <script>
    const TARGET = "http://10.10.5.59:8080/?view";
    const HEALTH = "http://10.10.5.59:8080/api/health";
    const statusEl = document.getElementById("status");
    const errorEl  = document.getElementById("error");
    const spinEl   = document.getElementById("spinner");
    const linkEl   = document.getElementById("manual-link");

    async function tryConnect() {
      try {
        // Quick reachability check (no-cors so we don't get blocked by CORS)
        await fetch(HEALTH, { mode: "no-cors", cache: "no-store" });
        statusEl.textContent = "Redirecting…";
        window.location.replace(TARGET);
      } catch (_) {
        spinEl.style.display = "none";
        statusEl.style.display = "none";
        errorEl.style.display = "block";
        linkEl.style.display  = "inline-block";
      }
    }

    tryConnect();
  </script>
</body>
</html>
