<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live EN/JA Transcriber</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card">
        <h1>Live Transcriber</h1>
        <p class="sub">Microphone on this machine, transcription on takelab over SSH tunnel.</p>

        <div class="controls">
          <label for="language">Language</label>
          <select id="language">
            <option value="auto">Auto Detect</option>
            <option value="en">English</option>
            <option value="ja">Japanese</option>
          </select>

          <button id="micButton" class="mic-off" type="button">Start Mic</button>
        </div>

        <div class="status-row">
          <span id="connection">Disconnected</span>
          <span id="recording">Mic Off</span>
        </div>

        <div id="transcript" class="transcript" aria-live="polite"></div>
      </section>
    </main>

    <script src="/static/app.js" type="module"></script>
  </body>
</html>
