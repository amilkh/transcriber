<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>竹本研究室 — Seminar Assistant</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="layout">
      <header class="topbar">
        <div class="brand">
          <span class="brand-ja">竹本研究室</span>
          <span class="brand-en">Seminar Assistant</span>
        </div>
        <div class="controls">
          <select id="micDevice" title="Microphone source"><option value="">Default Mic</option></select>
          <select id="language" title="Transcription language">
            <option value="ja">日本語</option>
            <option value="auto">Auto (JA/EN)</option>
            <option value="en">English</option>
          </select>
          <select id="targetLang" title="Translation target language">
            <option value="en">→ English</option>
            <option value="zh">→ 中文</option>
          </select>
          <button id="micButton" class="btn btn-mic mic-off" type="button">Start Mic</button>
          <button id="themeToggle" class="theme-toggle" type="button" title="Toggle dark/light mode">Dark</button>
        </div>
      </header>

      <div class="panels">
        <!-- Left: live transcript -->
        <section class="panel panel-transcript">
          <div class="panel-header">
            <h2>Live Transcript</h2>
            <span class="hint">JA → EN translation via local LLM</span>
          </div>
          <div id="transcript" class="transcript" aria-live="polite" aria-label="Live transcript"></div>
        </section>

        <!-- Right: RAG Q&A -->
        <section class="panel panel-qa">
          <div class="panel-header">
            <h2>Lab Assistant</h2>
            <span class="hint">Asks the lab knowledge base</span>
          </div>
          <div id="qa-messages" class="qa-messages" aria-live="polite" aria-label="Q&A messages"></div>
          <div class="qa-input-row">
            <input
              id="qa-input"
              type="text"
              placeholder="Ask about the lab, research, or today's discussion…"
              autocomplete="off"
            />
            <button id="qa-send" class="btn btn-ask" type="button">Ask</button>
          </div>
        </section>
      </div>
    </div>

    <script src="/static/app.js" type="module"></script>
  </body>
</html>
